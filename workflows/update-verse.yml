name: Update Daily Verse
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Verse
        run: |
          curl -s "https://dailyverses.net/get/verse.json?language=pt" > versiculo.json
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add versiculo.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update daily verse" && git push)
